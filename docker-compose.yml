# Sentora — Docker Compose
#
# Production: `docker compose up -d`
#   Builds the backend image (which also compiles and embeds the frontend)
#   and starts MongoDB. Everything is served from a single container on APP_PORT.
#
# Development: `./start.sh`
#   Runs uvicorn (port 5002) and Vite dev server (port 5003) locally,
#   with Vite proxying /api/* to uvicorn.

services:

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    # No ports exposed — accessible only within the Docker network.
    # For local development with external tools, uncomment:
    # ports:
    #   - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sentora
      MONGO_INITDB_ROOT_USERNAME: sentora
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-sentora_dev_password}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── MinIO (S3-compatible object storage for backups) ─────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    # No ports exposed — accessible only within the Docker network.
    # To access the MinIO Console UI for debugging, uncomment:
    # ports:
    #   - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sentora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sentora_minio_dev}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Create the default backup bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set sentora http://minio:9000 $${MINIO_ROOT_USER:-sentora} $${MINIO_ROOT_PASSWORD:-sentora_minio_dev};
      mc mb sentora/sentora-backups --ignore-existing;
      mc anonymous set none sentora/sentora-backups;
      exit 0;
      "

  # ── Jaeger (distributed tracing) ─────────────────────────────────────────────
  # Optional: start with `docker compose --profile tracing up`
  jaeger:
    image: jaegertracing/all-in-one:1.64
    profiles: [tracing]
    restart: unless-stopped
    # Only the Jaeger UI is exposed for debugging. OTLP ports are internal-only.
    # Uncomment to access the Jaeger UI:
    # ports:
    #   - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # ── Backend (embeds compiled frontend) ───────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5002}:5002"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://sentora:${MONGO_PASSWORD:-sentora_dev_password}@mongo:27017/?authSource=admin
      MONGO_DB: ${MONGO_DB:-sentora}
      APP_ENV: ${APP_ENV:-production}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_ENDPOINT: ${OTEL_ENDPOINT:-http://jaeger:4317}
      WORKERS: ${WORKERS:-1}
      BACKUP_STORAGE_TYPE: ${BACKUP_STORAGE_TYPE:-s3}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-http://minio:9000}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-sentora-backups}
      BACKUP_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-sentora}
      BACKUP_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-sentora_minio_dev}
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  mongo_data:
    driver: local
  minio_data:
    driver: local
