name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight CI runs for the same PR/branch to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Backend — Lint, Format, Type Check
  # ═══════════════════════════════════════════════════════════════════════════
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: ruff — lint (zero violations)
        run: ruff check backend/ --output-format=github

      - name: ruff — format check
        run: ruff format --check backend/

      - name: mypy — type check (strict)
        run: mypy backend/ --ignore-missing-imports

  # ═══════════════════════════════════════════════════════════════════════════
  # Backend — Tests (real MongoDB, coverage gate)
  # ═══════════════════════════════════════════════════════════════════════════
  backend-test:
    name: Backend — Tests (85% coverage gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install backend with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "backend/[dev]"

      - name: Run pytest with strict coverage gate
        env:
          MONGO_URI: mongodb://localhost:27017/sentora_test
          S1_BASE_URL: https://test.sentinelone.net
          S1_API_TOKEN: test_token_placeholder
          APP_ENV: development
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        working-directory: backend
        run: |
          pytest \
            --cov=. \
            --cov-fail-under=85 \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --strict-markers \
            --tb=short \
            -v

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Frontend — Type Check & Audit
  # ═══════════════════════════════════════════════════════════════════════════
  frontend-typecheck:
    name: Frontend — Type Check & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Verify lockfile integrity
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: vue-tsc — type check (zero errors)
        working-directory: frontend
        run: npx vue-tsc --noEmit

      - name: npm audit — no high/critical vulnerabilities
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

  # ═══════════════════════════════════════════════════════════════════════════
  # Frontend — Tests (Vitest with coverage)
  # ═══════════════════════════════════════════════════════════════════════════
  frontend-test:
    name: Frontend — Tests (coverage gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run Vitest with coverage
        working-directory: frontend
        run: npm run test -- --coverage --reporter=verbose

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Audit Chain — CLI tool hasher identity verification
  # ═══════════════════════════════════════════════════════════════════════════
  audit-chain-verify:
    name: Audit Chain — CLI hasher identity check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify CLI hasher is identical to backend hasher
        run: |
          diff backend/audit/chain/hasher.py tools/sentora_verify/hasher.py
          echo "Hasher files are identical"

      - name: Verify CLI tool runs without dependencies
        run: |
          cd tools
          python -m sentora_verify --help

  # ═══════════════════════════════════════════════════════════════════════════
  # Security — Python dependency audit (pip-audit)
  # ═══════════════════════════════════════════════════════════════════════════
  security-pip-audit:
    name: Security — pip-audit (CVE scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit and backend
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e backend/

      - name: pip-audit — check for known CVEs
        run: pip-audit --strict --desc on

  # ═══════════════════════════════════════════════════════════════════════════
  # Security — Bandit SAST (static application security testing)
  # ═══════════════════════════════════════════════════════════════════════════
  security-bandit:
    name: Security — Bandit SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Bandit — SAST scan (medium+ severity)
        run: bandit -r backend/ -x backend/tests/,backend/.venv/,backend/.mypy_cache/ -ll --format json -o bandit-report.json || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json
          retention-days: 30

      - name: Bandit — fail on medium+ severity
        run: bandit -r backend/ -x backend/tests/,backend/.venv/,backend/.mypy_cache/ -ll --format txt

  # ═══════════════════════════════════════════════════════════════════════════
  # Security — Secret scanning (detect committed secrets)
  # ═══════════════════════════════════════════════════════════════════════════
  security-secrets:
    name: Security — Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for committed secrets
        run: |
          detect-secrets scan \
            --exclude-files '\.env\.example$' \
            --exclude-files 'package-lock\.json$' \
            --exclude-files '\.pyc$' \
            --exclude-files 'coverage/' \
            --exclude-files 'dist/' \
            --exclude-secrets 'test_token_placeholder' \
            --exclude-secrets 'build_placeholder' \
            --exclude-secrets 'ci-test-secret-key' \
            > .secrets-report.json
          # Fail if any high-confidence secrets are detected
          python -c "
          import json, sys
          with open('.secrets-report.json') as f:
              report = json.load(f)
          results = report.get('results', {})
          total = sum(len(v) for v in results.values())
          if total > 0:
              print(f'FAILURE: {total} potential secret(s) detected')
              for path, findings in results.items():
                  for finding in findings:
                      print(f'  {path}:{finding[\"line_number\"]}: {finding[\"type\"]}')
              sys.exit(1)
          else:
              print('No secrets detected')
          "

  # ═══════════════════════════════════════════════════════════════════════════
  # Docker — Build & scan container image
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build:
    name: Docker — Build & Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend-lint
      - backend-test
      - frontend-typecheck
      - frontend-test
      - security-pip-audit
      - security-bandit
      - audit-chain-verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create minimal .env for build
        run: |
          cat <<'EOF' > .env
          S1_BASE_URL=https://test.sentinelone.net
          S1_API_TOKEN=build_placeholder
          MONGO_URI=mongodb://mongo:27017/sentora
          APP_ENV=production
          JWT_SECRET_KEY=docker-build-test-key-not-for-production
          EOF

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          load: true
          tags: sentora-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          load: true
          tags: sentora-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy — container vulnerability scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sentora-backend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy — container vulnerability scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sentora-frontend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ═══════════════════════════════════════════════════════════════════════════
  # SBOM — Software Bill of Materials generation
  # ═══════════════════════════════════════════════════════════════════════════
  sbom:
    name: SBOM — Generate Software Bill of Materials
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Generate Python SBOM (CycloneDX)
        working-directory: backend
        run: cyclonedx-py requirements -i requirements.txt -o ../sbom-backend.json --format json

      - name: Generate Node.js SBOM (CycloneDX)
        working-directory: frontend
        run: npx @cyclonedx/cyclonedx-npm --output-file ../sbom-frontend.json --output-format json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-backend.json
            sbom-frontend.json
          retention-days: 90
