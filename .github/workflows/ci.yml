name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Pre-commit — Single source of truth for lint, format, types, secrets
  # Runs .pre-commit-config.yaml: ruff, mypy, vue-tsc, detect-secrets, hasher
  # ═══════════════════════════════════════════════════════════════════════════
  pre-commit:
    name: Pre-commit (lint, format, types, secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install backend type-check dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-PyYAML

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run pre-commit on all files
        uses: pre-commit/action@v3.0.1
        env:
          SKIP: no-commit-to-branch

  # ═══════════════════════════════════════════════════════════════════════════
  # Backend — Tests (real MongoDB, coverage gate)
  # ═══════════════════════════════════════════════════════════════════════════
  backend-test:
    name: Backend — Tests (85% coverage gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install backend with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "backend/[dev]"

      - name: Run pytest with strict coverage gate
        env:
          MONGO_URI: mongodb://localhost:27017/sentora_test
          S1_BASE_URL: https://test.sentinelone.net
          S1_API_TOKEN: test_token_placeholder
          APP_ENV: development
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        working-directory: backend
        run: |
          pytest \
            --cov=. \
            --cov-fail-under=85 \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --strict-markers \
            --tb=short \
            -v

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Frontend — Tests (Vitest with coverage)
  # ═══════════════════════════════════════════════════════════════════════════
  frontend-test:
    name: Frontend — Tests (coverage gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: npm audit — fail on high+ severity (production deps)
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

      - name: Run Vitest with coverage
        working-directory: frontend
        run: npm run test -- --coverage --reporter=verbose

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # E2E Tests — Playwright (full-stack integration)
  # ═══════════════════════════════════════════════════════════════════════════
  e2e-tests:
    name: E2E Tests (Playwright)
    # TODO(2026-03-16): E2E suite needs auth fixtures (TOTP setup) before it
    # can be a hard gate. Most tests fail because the router guard redirects
    # unauthenticated pages to /login. Remove continue-on-error once auth
    # fixtures are implemented.
    continue-on-error: true
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGO_URI: mongodb://localhost:27017
      MONGO_DB: sentora_e2e
      JWT_SECRET_KEY: e2e-test-secret-key-not-for-production
      APP_ENV: development
      S1_BASE_URL: https://example.sentinelone.net
      S1_API_TOKEN: e2e-placeholder-token
      PASSWORD_CHECK_BREACHED: "false"  # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════════
  # Security — pip-audit (Python dependency CVE scan)
  # ═══════════════════════════════════════════════════════════════════════════
  security-pip-audit:
    name: Security — pip-audit (CVE scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: pip-audit — check for known CVEs
        run: pip-audit --strict -r backend/requirements.txt

  # ═══════════════════════════════════════════════════════════════════════════
  # Security — Bandit SAST (static application security testing)
  # ═══════════════════════════════════════════════════════════════════════════
  security-bandit:
    name: Security — Bandit SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Bandit — SAST scan (medium+ severity, report)
        run: |
          bandit -r backend/ \
            -x backend/tests/,backend/.venv/,backend/.mypy_cache/ \
            -ll \
            --format json \
            -o bandit-report.json || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json
          retention-days: 30

      - name: Bandit — fail on medium+ severity
        run: |
          bandit -r backend/ \
            -x backend/tests/,backend/.venv/,backend/.mypy_cache/ \
            -ll \
            --format txt

  # ═══════════════════════════════════════════════════════════════════════════
  # Docker — Build & scan container images
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build:
    name: Docker — Build & Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - pre-commit
      - backend-test
      - frontend-test
      - security-pip-audit
      - security-bandit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create minimal .env for build
        run: |
          cat <<'EOF' > .env
          S1_BASE_URL=https://test.sentinelone.net
          S1_API_TOKEN=build_placeholder
          MONGO_URI=mongodb://mongo:27017/sentora
          APP_ENV=production
          JWT_SECRET_KEY=docker-build-test-key-not-for-production
          EOF

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          load: true
          tags: sentora-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          load: true
          tags: sentora-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy — container vulnerability scan (backend)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: sentora-backend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy — container vulnerability scan (frontend)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: sentora-frontend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ═══════════════════════════════════════════════════════════════════════════
  # SBOM — Software Bill of Materials (main branch only)
  # ═══════════════════════════════════════════════════════════════════════════
  sbom:
    name: SBOM — Generate Software Bill of Materials
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Generate Python SBOM (CycloneDX)
        working-directory: backend
        run: cyclonedx-py requirements -i requirements.txt -o ../sbom-backend.json --format json

      - name: Generate Node.js SBOM (CycloneDX)
        working-directory: frontend
        run: npx @cyclonedx/cyclonedx-npm --output-file ../sbom-frontend.json --output-format json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-backend.json
            sbom-frontend.json
          retention-days: 90
